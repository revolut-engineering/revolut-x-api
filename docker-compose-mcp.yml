services:
  worker:
    build:
      context: worker/
    ports:
      - "8080:8080"
    volumes:
      - revolutx-data:/data
    restart: unless-stopped

  mcp:
    build:
      context: mcp/
    ports:
      - "8000:8000"
    volumes:
      - revolutx-data:/data
    environment:
      REVOLUTX_WORKER_URL: http://worker:8080
    depends_on:
      worker:
        condition: service_healthy


volumes:
  revolutx-data:
